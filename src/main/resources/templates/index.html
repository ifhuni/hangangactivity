<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HangangActivity</title>
    <!-- Bootstrap CSS -->
    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap JS -->
    <script src="/js/bootstrap.bundle.min.js"></script>
    <!-- Bootstrap ICON -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">


    <style>
        .container-body {
            display: flex;
            justify-content: space-between;
            margin: 0 auto;
            max-width: 1200px;
        }
        .filter-section {
            flex: 1;
            max-width: 240px;
        }
        .content-section {
            margin: 0 auto;
            flex: 3;
        }
        .ad-section {
            flex: 1;
            max-width: 300px;
        }
    </style>
</head>
<body>
    <!-- 헤더 -->
    <div th:replace="fragments/header.html :: header"></div>

    <main id="main-content" class="container-body my-4">
        <!-- Filter Section -->
        <aside class="filter-section bg-light p-3 mr-3">
            <h4>필터</h4>
            <!-- Add filter controls here -->
            <p>검색조건</p>
            <button class="btn btn-primary btn-sm" onclick="applyFilter()">Apply Filter</button>
        </aside>

        <!-- Content Section -->
        <section class="content-section bg-white p-3">
            <h4>프로그램</h4>
            <div id="filtered-content">
                <p>업체가 등록한 프로그램을 조회할 수 있는 화면</p>
            </div>
            <button class="btn btn-primary" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasScrolling" aria-controls="offcanvasScrolling">Enable body scrolling</button>
            <div class="offcanvas offcanvas-start" data-bs-scroll="true" data-bs-backdrop="false" tabindex="-1" id="offcanvasScrolling" aria-labelledby="offcanvasScrollingLabel">
                <div class="offcanvas-header">
                    <h5 class="offcanvas-title" id="offcanvasScrollingLabel">예약등록 폼</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
                </div>
                <div class="offcanvas-body">
                    <p>TODO : 예약을 할 수 있는 폼 넣을 꺼임.</p>
                </div>
            </div>
        </section>

        <!-- Ad Section -->
        <aside class="ad-section bg-secondary text-white p-3 ml-3">
            <h4>광고</h4>
            <p>용도 미정. 광고를 넣으면 좋겠다 판단</p>
        </aside> 
    </main>

    <!-- 바텀 -->
    <div th:replace="fragments/footer.html :: footer"></div>

    <script>
        function applyFilter() {
            // Example JavaScript to handle filter logic
            document.getElementById('filtered-content').innerHTML = '<p>검색 하였음.</p>';
        }

        function loadContent(url) {
            fetch(url)  // URL에서 HTML을 가져옴
                .then(response => response.text()) // 응답을 텍스트(HTML)로 변환
                .then(html => {
                    document.getElementById("main-content").innerHTML = html; // 특정 영역에 삽입
                })
                .catch(error => console.error('Error loading content:', error));
        }
    </script>
</body>
</html>
