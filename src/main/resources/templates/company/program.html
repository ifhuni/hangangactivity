<body>
    <div class="container-fluid">
        <!-- Page Heading -->
        <h1 class="h3 mb-2 text-gray-800">프로그램(program)</h1>
        <p class="mb-4">프로그램을 등록할 수 있습니다.</p>

        <!-- DataTales Example -->
        <div class="card shadow mb-4">
            <div class="card-header py-3">
                <h6 class="m-0 font-weight-bold text-primary">program Table</h6>
                <button class="d-none d-sm-inline-block btn btn-sm btn-primary shadow-sm" id="fetchPrograms">조회</button>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-bordered" id="dataTable" width="100%" cellspacing="0">
                        <thead>
                            <tr>
                                <th>id</th>
                                <th>name</th>
                                <th>description</th>
                            </tr>
                        </thead>
                        <tbody id="programTableBody">
                            <!-- Dynamic data will be injected here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>
    <script>
        document.getElementById("fetchPrograms").addEventListener("click", async function() {
            try {
                const response = await fetch('/api/programs'); // Adjust the URL if necessary
                const programs = await response.json();

                // Clear existing table rows
                const tableBody = document.getElementById("programTableBody");
                tableBody.innerHTML = "";

                // Populate the table with new rows
                programs.forEach(program => {
                    const row = document.createElement("tr");
                    row.innerHTML = `
                        <td>${program.id}</td>
                        <td>${program.name}</td>
                        <td>${program.description}</td>
                    `;
                    tableBody.appendChild(row);
                });
            } catch (error) {
                console.error("Error fetching programs:", error);
            }
        });
    </script>
</body>
