<header th:fragment="header" style="border-bottom: 1px solid #e5e7eb;padding-top:15px">
    <div style="background-color: #ffffff;">
        <!-- 상단 영역: 사이트 아이콘, 버튼 -->
        <div class="container" style="max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center;">
            <!-- 사이트 아이콘 -->
            <div class="d-flex align-items-center">
                <h1 class="h2 mb-0" style="font-weight: 600;">
                    <span style="color: #00B493;">Hangang</span>Activity
                </h1>
            </div>
            
            <!-- 버튼들 -->
            <div class="d-flex align-items-center">
                <!-- 마이페이지 아이콘 및 텍스트 -->
                <div class="d-flex flex-column align-items-center me-3" role="button" tabindex="0">
                    <div class="ant-image" style="width: 30px; height: 30px;">
                        <i class="bi bi-person" style="font-size: 30px;"></i> <!-- 아이콘 크기 30px -->
                    </div>
                    <span class="mt-2" style="font-size: 11px; color: #000000; font-weight: 500;">마이페이지</span> <!-- 폰트 크기 11px로 변경, 여백 추가 -->
                </div>
            
                <!-- 로그인 아이콘 및 텍스트 -->
                <div class="d-flex flex-column align-items-center me-3" role="button" tabindex="0">
                    <div class="ant-image" style="width: 30px; height: 30px;">
                        <i class="bi bi-person" style="font-size: 30px;"></i> <!-- 아이콘 크기 30px -->
                    </div>
                    <span class="mt-2" style="font-size: 11px; color: #000000; font-weight: 500;">로그인</span> <!-- 폰트 크기 11px로 변경, 여백 추가 -->
                </div>
            
                <!-- 로그아웃 아이콘 및 텍스트 -->
                <div class="d-flex flex-column align-items-center me-3" role="button" tabindex="0">
                    <div class="ant-image" style="width: 30px; height: 30px;">
                        <i class="bi bi-box-arrow-right" style="font-size: 30px;"></i> <!-- 아이콘 크기 30px -->
                    </div>
                    <span class="mt-2" style="font-size: 11px; color: #000000; font-weight: 500;">로그아웃</span> <!-- 폰트 크기 11px로 변경, 여백 추가 -->
                </div>
            
                <!-- 예약 확인 아이콘 및 텍스트 -->
                <div class="d-flex flex-column align-items-center me-3" role="button" tabindex="0">
                    <div class="ant-image" style="width: 30px; height: 30px;">
                        <i class="bi bi-calendar-check" style="font-size: 30px;"></i> <!-- 아이콘 크기 30px -->
                    </div>
                    <span class="mt-2" style="font-size: 11px; color: #000000; font-weight: 500;">예약 확인</span> <!-- 폰트 크기 11px로 변경, 여백 추가 -->
                </div>
            </div>
            
        </div>
    </div>

    <!-- 네비게이션 바 -->

</header>
